<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Fetch</title>

    <style>
        *{
            margin: 0;
            padding: 0;
        }
        body{
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container{
            text-align: center;
        }
        .container button{
            margin: 10px 0px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Consulte o CEP</h1>
        <input type="text" id="inputCep"><br>
        <button id="botaoThen">Buscar com o .then</button>
        <button id="botaoAsAw">Buscar com async/await</button>
    </div>

        <script defer>
const botao1 = document.getElementById('botaoThen');
const botao2 = document.getElementById('botaoAsAw');

const cep = document.getElementById('inputCep');

function buscarCepThen(){
    
const url = `https://viacep.com.br/ws/${cep.value}/json/`;
const consulta = fetch(url)

consulta
.then((resposta) => { 
    if(!resposta.ok){
        throw new Error('Erro na requisição.')
    }
    return resposta.json()
})
.then((dados) => {
    if(dados.erro){
        throw new Error('Verifique o CEP novamente!')
    }
    console.log(dados)})
.catch((error) =>{console.warn(error.message)});
};

// -------------------------------------------------------------


    

async function buscarCep(){
    const url = `https://viacep.com.br/ws/${cep.value}/json/`;
    const consulta = fetch(url)
    let resposta = await consulta;
    let dataObj = await resposta.json();
    console.log(dataObj)
};

botao1.addEventListener('click', buscarCepThen)
botao2.addEventListener('click', buscarCep)</script>
</body>
</html>
